<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot of Learning — คำแนะนำประจำวัน</title>
<style>
  :root{
    --bg-1:#150b28;
    --bg-2:#2c1654;
    --gold:#e8c468;
    --gold-soft:#f5e2a8;
    --ink:#f3eee0;
    --card-w:260px;
    --card-h:445px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% 20%, var(--bg-2), var(--bg-1) 70%);
    font-family:'Trebuchet MS', 'Segoe UI', sans-serif;
    color:var(--ink);
    padding:32px 16px;
    overflow-x:hidden;
  }
  .stars{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }
  .stars span{
    position:absolute; width:3px; height:3px; background:var(--gold-soft);
    border-radius:50%; opacity:.6; animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:.15;}50%{opacity:.9;}}

  .stage{
    position:relative; z-index:1;
    width:100%; max-width:560px;
    text-align:center;
  }
  h1{
    font-size:1.7rem; letter-spacing:.08em; margin:0 0 4px;
    color:var(--gold-soft); text-shadow:0 0 18px rgba(232,196,104,.5);
  }
  .sub{
    margin:0 0 28px; font-size:.95rem; opacity:.75;
  }
  .deck-area{
    display:flex; flex-direction:column; align-items:center; gap:22px;
  }
  .card-frame{
    width:var(--card-w); height:var(--card-h);
    perspective:1400px;
  }
  .card-3d{
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d;
    transition:transform 1.1s cubic-bezier(.2,.8,.2,1);
  }
  .card-3d.flipped{ transform: rotateY(180deg); }
  .card-3d.shaking{ animation: shake .5s ease-in-out infinite; }
  @keyframes shake{
    0%,100%{ transform: translateY(0) rotate(0); }
    25%{ transform: translateY(-6px) rotate(-2deg); }
    75%{ transform: translateY(-6px) rotate(2deg); }
  }
  .face{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius:18px; overflow:hidden;
    box-shadow:0 18px 38px rgba(0,0,0,.55), 0 0 0 1px rgba(232,196,104,.25);
  }
  .face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .face.back{ background:#1a0e33; }
  .face.front{ transform: rotateY(180deg); }

  .glow{
    position:absolute; inset:-14px; border-radius:26px;
    background:radial-gradient(circle, rgba(232,196,104,.35), transparent 70%);
    opacity:0; transition:opacity .6s ease; pointer-events:none; filter:blur(4px);
  }
  .card-frame.revealed .glow{ opacity:1; }

  button{
    font-family:inherit; font-size:1rem; letter-spacing:.04em;
    padding:13px 30px; border-radius:999px; border:1px solid var(--gold);
    background:linear-gradient(180deg, rgba(232,196,104,.18), rgba(232,196,104,.05));
    color:var(--gold-soft); cursor:pointer;
    transition:transform .15s ease, box-shadow .25s ease, opacity .2s ease;
  }
  button:hover{ box-shadow:0 0 22px rgba(232,196,104,.45); transform:translateY(-1px); }
  button:disabled{ opacity:.45; cursor:default; transform:none; box-shadow:none; }

  .status{ min-height:22px; font-size:.85rem; opacity:.7; letter-spacing:.03em; }

  .reading{
    width:100%;
    margin-top:6px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(232,196,104,.25);
    border-radius:16px;
    padding:22px 24px 26px;
    opacity:0; transform:translateY(8px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .reading.show{ opacity:1; transform:translateY(0); }
  .reading .name{
    font-size:1.25rem; color:var(--gold-soft); margin:0 0 2px; font-weight:600;
  }
  .reading .type{
    font-size:.8rem; opacity:.65; margin:0 0 14px; letter-spacing:.05em;
  }
  .reading .quote{
    font-style:italic; font-size:1.05rem; margin:0 0 14px; line-height:1.5;
  }
  .reading .quote .en{ display:block; opacity:.6; font-size:.85rem; margin-top:4px; font-style:normal;}
  .reading .meaning{
    font-size:.92rem; line-height:1.7; opacity:.9; text-align:left;
  }
  .reading .meaning .en{
    display:block; margin-top:10px; opacity:.6; font-size:.82rem;
  }
  hr.div{ border:none; border-top:1px solid rgba(232,196,104,.2); margin:14px 0; }

  footer{
    margin-top:26px; font-size:.72rem; opacity:.45;
  }

  @media (max-width:420px){
    :root{ --card-w:210px; --card-h:360px; }
    h1{ font-size:1.4rem; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="stage">
  <h1>TAROT OF LEARNING</h1>
  <p class="sub">เปิดไพ่ 1 ใบ รับคำแนะนำสำหรับการเรียนรู้ของคุณวันนี้</p>

  <div class="deck-area">
    <div class="card-frame" id="cardFrame">
      <div class="glow"></div>
      <div class="card-3d" id="card3d">
        <div class="face back"><img src="assets/card-back.png" alt="Tarot of Learning back"></div>
        <div class="face front"><img id="cardImg" src="" alt=""></div>
      </div>
    </div>

    <button id="drawBtn">เปิดไพ่แนะนำวันนี้</button>
    <div class="status" id="status"></div>

    <div class="reading" id="reading">
      <p class="name" id="rName"></p>
      <p class="type" id="rType"></p>
      <p class="quote" id="rQuote"></p>
      <hr class="div">
      <p class="meaning" id="rMeaning"></p>
      <hr class="div">
      <button id="rerollBtn" style="margin-top:4px;">สุ่มใหม่ (เผื่ออยากลองอีกใบ)</button>
    </div>
  </div>

  <footer>Tarot of Learning — by Wizards of Learning</footer>
</div>

// stars background
const starsEl = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s = document.createElement('span');
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.animationDelay = (Math.random()*3)+'s';
  s.style.width = s.style.height = (Math.random()*2+1.5)+'px';
  starsEl.appendChild(s);
}

const cardFrame = document.getElementById('cardFrame');
const card3d = document.getElementById('card3d');
const cardImg = document.getElementById('cardImg');
const drawBtn = document.getElementById('drawBtn');
const rerollBtn = document.getElementById('rerollBtn');
const statusEl = document.getElementById('status');
const reading = document.getElementById('reading');

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function pickCard(forceRandom){
  if(!forceRandom){
    const saved = localStorage.getItem('tol_daily');
    if(saved){
      const data = JSON.parse(saved);
      if(data.date === todayKey()){
        return CARDS[data.n];
      }
    }
  }
  const card = CARDS[Math.floor(Math.random()*CARDS.length)];
  localStorage.setItem('tol_daily', JSON.stringify({date: todayKey(), n: card.n}));
  return card;
}

function renderReading(card){
  document.getElementById('rName').textContent = card.head;
  document.getElementById('rType').textContent = card.type + ' — ' + card.tagTh + ' / ' + card.tagEn;
  document.getElementById('rQuote').innerHTML = '"' + card.openTh + '"<span class="en">' + card.openEn + '</span>';
  document.getElementById('rMeaning').innerHTML = card.meanTh + '<span class="en">' + card.meanEn + '</span>';
}

function revealCard(card){
  cardImg.src = 'assets/cards/' + card.img;
  cardImg.alt = card.head;
  card3d.classList.add('flipped');
  cardFrame.classList.add('revealed');
  renderReading(card);
  setTimeout(()=>{ reading.classList.add('show'); }, 350);
}

function runDraw(forceRandom){
  drawBtn.disabled = true;
  rerollBtn.disabled = true;
  reading.classList.remove('show');
  card3d.classList.remove('flipped');
  cardFrame.classList.remove('revealed');
  cardImg.src = '';

  const messages = ['กำลังสลับไพ่...', 'จักรวาลกำลังเลือกให้คุณ...', 'รอสักครู่...'];
  let mi = 0;
  statusEl.textContent = messages[0];
  card3d.classList.add('shaking');
  const msgInterval = setInterval(()=>{
    mi = (mi+1) % messages.length;
    statusEl.textContent = messages[mi];
  }, 700);

  const delay = 1700 + Math.random()*900; // suspense delay
  setTimeout(()=>{
    clearInterval(msgInterval);
    card3d.classList.remove('shaking');
    statusEl.textContent = '';
    const card = pickCard(forceRandom);
    revealCard(card);
    drawBtn.disabled = false;
    rerollBtn.disabled = false;
    drawBtn.textContent = 'เปิดไพ่อีกครั้ง';
  }, delay);
}

drawBtn.addEventListener('click', ()=> runDraw(false));
rerollBtn.addEventListener('click', ()=> runDraw(true));

// auto-show if already drawn today, no animation
(function init(){
  const saved = localStorage.getItem('tol_daily');
  if(saved){
    const data = JSON.parse(saved);
    if(data.date === todayKey()){
      const card = CARDS[data.n];
      cardImg.src = 'assets/cards/' + card.img;
      cardImg.alt = card.head;
      card3d.classList.add('flipped');
      cardFrame.classList.add('revealed');
      renderReading(card);
      reading.classList.add('show');
      drawBtn.textContent = 'เปิดไพ่อีกครั้ง';
    }
  }
})();
</script>
