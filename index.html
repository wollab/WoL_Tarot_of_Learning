<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot of Learning — คำแนะนำประจำวัน</title>

<meta property="og:image" content="https://wollab.github.io/WoL_Tarot_of_Learning/assets/og-image.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wollab.github.io/WoL_Tarot_of_Learning/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Tarot of Learning — by Wizards of Learning">
<meta name="twitter:description" content="เปิดไพ่ 1 ใบ หรือเลือกสไปรด์ รับคำแนะนำการเรียนรู้ที่ใช่สำหรับคุณวันนี้">
<meta name="twitter:image" content="https://wollab.github.io/WoL_Tarot_of_Learning/assets/og-image.png">
<link rel="icon" href="assets/card-back.png">
<style>
  @font-face{
    font-family:'Kanit';
    src:url('assets/fonts/Kanit-Light.ttf') format('truetype');
    font-weight:300;
  }
  @font-face{
    font-family:'Kanit';
    src:url('assets/fonts/Kanit-Regular.ttf') format('truetype');
    font-weight:400;
  }
  @font-face{
    font-family:'Kanit';
    src:url('assets/fonts/Kanit-SemiBold.ttf') format('truetype');
    font-weight:600;
  }

  :root{
    --teal:#50c2c0;
    --teal-deep:#1a8586;
    --orange:#fec566;
    --orange-deep:#d78600;
    --canvas:#fffdf8;
    --ink:#1c4b4b;
    --ink-soft:#3f6e6d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(254,197,102,.55), transparent 60%),
      linear-gradient(180deg, var(--canvas) 0%, #eaf7f6 55%, #d8f0ee 100%);
    background-attachment:fixed;
    font-family:'Kanit','Trebuchet MS','Segoe UI',sans-serif;
    font-weight:300;
    color:var(--ink);
    padding:32px 16px 60px;
    overflow-x:hidden;
  }
  .rays{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    overflow:hidden;
  }
  .rays::before{
    content:'';
    position:absolute; left:50%; top:-20%;
    width:1400px; height:1400px;
    margin-left:-700px;
    background:repeating-conic-gradient(
      from 0deg,
      rgba(254,197,102,.16) 0deg 6deg,
      transparent 6deg 18deg
    );
    border-radius:50%;
  }

  .sparkle{
    position:fixed; z-index:0; pointer-events:none;
    width:5px; height:5px; border-radius:50%;
    background:var(--orange);
    opacity:.55; animation:twinkle 3.2s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.7);}50%{opacity:.85;transform:scale(1.1);}}

  .stage{
    position:relative; z-index:1;
    width:100%; max-width:760px;
    text-align:center;
  }
  .brand-logo{
    width:64px; height:64px; object-fit:contain; margin:0 0 6px;
  }
  h1{
    font-weight:600;
    font-size:1.8rem; letter-spacing:.06em; margin:0 0 4px;
    color:var(--teal-deep);
  }
  .sub{
    margin:0 0 28px; font-size:.95rem; color:var(--ink-soft);
  }

  /* ---- mode select screen ---- */
  .modes{
    display:grid; grid-template-columns:1fr 1fr; gap:16px;
    max-width:560px; margin:0 auto;
  }
  .mode-card{
    background:rgba(255,255,255,.7);
    border:1.5px solid rgba(80,194,192,.35);
    border-radius:16px;
    padding:20px 16px;
    cursor:pointer;
    text-align:left;
    transition:transform .15s ease, box-shadow .25s ease, border-color .2s ease;
  }
  .mode-card:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 26px rgba(26,133,134,.18);
    border-color:var(--teal);
  }
  .mode-card .count{
    display:inline-block; font-size:.72rem; font-weight:600;
    background:var(--teal); color:#fff; padding:2px 10px; border-radius:999px;
    margin-bottom:10px;
  }
  .layout-box{
    position:relative; width:70px; height:64px; margin:0 auto 10px;
  }
  .layout-chip{
    position:absolute;
    width:17px; height:28px; border-radius:3px;
    background:linear-gradient(180deg, var(--teal), var(--teal-deep));
    box-shadow:0 2px 5px rgba(26,133,134,.35);
    display:flex; align-items:center; justify-content:center;
  }
  .layout-chip.alt{ background:linear-gradient(180deg, var(--orange), var(--orange-deep)); }
  .mode-card h3{
    margin:0 0 6px; font-size:1.02rem; font-weight:600; color:var(--teal-deep);
  }
  .mode-card p{
    margin:0; font-size:.78rem; color:var(--ink-soft); line-height:1.5;
  }
  .mode-card .uses-left{
    margin-top:8px; font-size:.7rem; color:var(--teal-deep); font-weight:600;
  }
  .mode-card.disabled{
    cursor:default; opacity:.55; filter:grayscale(.4);
  }
  .mode-card.disabled:hover{ transform:none; box-shadow:none; border-color:rgba(80,194,192,.35); }
  .mode-card.disabled .uses-left{ color:var(--orange-deep); }
  @media (max-width:480px){
    .modes{ grid-template-columns:1fr; }
  }

  /* ---- spread screen ---- */
  .spread-head{
    margin-bottom:18px;
  }
  .spread-head h2{
    font-size:1.3rem; font-weight:600; color:var(--teal-deep); margin:0 0 4px;
  }
  .spread-head p{
    font-size:.85rem; color:var(--ink-soft); margin:0;
  }
  .backlink{
    display:inline-block; margin-bottom:14px; font-size:.8rem; color:var(--ink-soft);
    cursor:pointer; text-decoration:underline;
  }

  .spread-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
    gap:18px;
    max-width:680px;
    margin:0 auto 28px;
  }
  .slot{
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .slot .card-frame{
    width:100%; max-width:150px; aspect-ratio:260/445;
    perspective:1200px; cursor:default;
  }
  .slot.revealed .card-frame{ cursor:pointer; }
  .slot-label{
    font-size:.72rem; color:var(--ink-soft); line-height:1.4; min-height:2.2em;
  }
  .slot.revealed .slot-label{ color:var(--teal-deep); font-weight:600; }
  .slot-quote{
    font-size:.74rem; color:var(--orange-deep); line-height:1.45; font-style:italic;
    opacity:0; transform:translateY(4px);
    transition:opacity .5s ease, transform .5s ease;
  }
  .slot-quote.show{ opacity:1; transform:translateY(0); }
  .slot-quote strong{ font-style:normal; color:var(--teal-deep); }

  .card-frame{ position:relative; }
  .card-3d{
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d;
    transition:transform 1.1s cubic-bezier(.2,.8,.2,1);
  }
  .card-3d.flipped{ transform: rotateY(180deg); }
  .card-3d.shaking{ animation: shake .3s ease-in-out infinite; }
  @keyframes shake{
    0%,100%{ transform: translateY(0) rotate(0); }
    25%{ transform: translateY(-6px) rotate(-2deg); }
    75%{ transform: translateY(-6px) rotate(2deg); }
  }
  .face{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius:14px; overflow:hidden;
    box-shadow:0 12px 26px rgba(26,133,134,.22), 0 0 0 1px rgba(80,194,192,.35);
  }
  .face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .face.back{ background:var(--teal); }
  .face.front{ transform: rotateY(180deg); }

  .glow{
    position:absolute; inset:-10px; border-radius:22px;
    background:radial-gradient(circle, rgba(254,197,102,.55), transparent 70%);
    opacity:0; transition:opacity .6s ease; pointer-events:none; filter:blur(4px);
  }
  .slot.revealed .glow{ opacity:1; }

  button{
    font-family:inherit; font-weight:600; font-size:1rem; letter-spacing:.03em;
    padding:13px 32px; border-radius:999px; border:none;
    background:linear-gradient(180deg, var(--orange), var(--orange-deep));
    color:#fff; cursor:pointer;
    box-shadow:0 8px 20px rgba(215,134,0,.35);
    transition:transform .15s ease, box-shadow .25s ease, opacity .2s ease;
  }
  button:hover{ box-shadow:0 10px 26px rgba(215,134,0,.45); transform:translateY(-1px); }
  button:disabled{ opacity:.45; cursor:default; transform:none; box-shadow:none; }
  button.secondary{
    background:transparent;
    border:1.5px solid var(--teal-deep);
    color:var(--teal-deep);
    box-shadow:none;
  }
  button.secondary:hover{ box-shadow:0 0 0 4px rgba(80,194,192,.15); }

  .status{ min-height:22px; font-size:.85rem; color:var(--ink-soft); letter-spacing:.02em; margin-top:10px; }

  /* ---- summary ---- */
  .summary{
    max-width:620px; margin:30px auto 0;
    opacity:0; transform:translateY(8px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .summary.show{ opacity:1; transform:translateY(0); }
  .summary h2{
    font-size:1.2rem; font-weight:600; color:var(--teal-deep); margin:0 0 16px;
  }
  .summary-item{
    background:rgba(255,255,255,.7);
    border:1px solid rgba(80,194,192,.3);
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:12px;
    text-align:left;
    box-shadow:0 8px 22px rgba(26,133,134,.08);
    display:flex; gap:14px; align-items:flex-start;
  }
  .summary-item .summary-thumb{
    flex:none; width:54px; height:92px; object-fit:cover;
    border-radius:6px; box-shadow:0 4px 10px rgba(26,133,134,.25);
  }
  .summary-item .summary-text{ flex:1; min-width:0; }
  .summary-item .label{
    font-size:.74rem; color:var(--orange-deep); font-weight:600; margin-bottom:4px;
  }
  .summary-item .name{
    font-size:1.05rem; font-weight:600; color:var(--teal-deep); margin-bottom:4px;
  }
  .summary-item .quote{
    font-style:italic; font-size:.92rem; color:var(--ink); margin-bottom:8px;
  }
  .summary-item .meaning-short{
    font-size:.84rem; color:var(--ink-soft); line-height:1.6;
  }
  .share-actions{
    margin-top:20px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
  }
  .share-btn{
    font-family:inherit; font-weight:600; font-size:.82rem; letter-spacing:.01em;
    padding:9px 16px; border-radius:999px; border:none;
    background:linear-gradient(180deg, var(--teal), var(--teal-deep));
    color:#fff; cursor:pointer;
    box-shadow:0 5px 14px rgba(26,133,134,.28);
    transition:transform .15s ease, box-shadow .25s ease, opacity .2s ease;
  }
  .share-btn:hover{ box-shadow:0 7px 18px rgba(26,133,134,.38); transform:translateY(-1px); }
  .share-btn:disabled{ opacity:.45; cursor:default; transform:none; box-shadow:none; }

  .nav-actions{
    margin-top:16px; display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .nav-btn{
    font-family:inherit; font-weight:500; font-size:.82rem;
    padding:8px 14px; border-radius:999px; border:1.5px solid rgba(80,194,192,.45);
    background:transparent; color:var(--teal-deep); cursor:pointer;
    transition:background .15s ease;
  }
  .nav-btn:hover{ background:rgba(80,194,192,.1); }
  .uses-inline{ font-size:.74rem; opacity:.75; font-weight:400; }
  @media (max-width:440px){
    .nav-actions{ flex-direction:column; align-items:stretch; }
  }

  hr.div{ border:none; border-top:1px solid rgba(80,194,192,.3); margin:12px 0; }

  /* ---- card image protection ---- */
  .face img, .summary-thumb{
    -webkit-user-drag:none; user-drag:none;
    user-select:none; -webkit-touch-callout:none;
    pointer-events:none;
  }

  /* ---- gacha reveal effects ---- */
  .burst{
    position:absolute; inset:-10px; border-radius:24px;
    background:radial-gradient(circle, rgba(254,197,102,.95), rgba(254,197,102,.35) 45%, transparent 72%);
    opacity:0; transform:scale(.3);
    pointer-events:none; z-index:2;
  }
  .burst.active{ animation: burstPop .4s ease-out; }
  @keyframes burstPop{
    0%{ opacity:0; transform:scale(.3); }
    30%{ opacity:1; transform:scale(1.1); }
    100%{ opacity:0; transform:scale(1.4); }
  }
  .card-frame.charging .glow{
    opacity:1;
    animation: chargePulse .45s ease-in-out infinite;
  }
  @keyframes chargePulse{
    0%,100%{ opacity:.4; transform:scale(.96); }
    50%{ opacity:.9; transform:scale(1.04); }
  }
  .card-frame.pop{ animation: popScale .3s ease-out; }
  @keyframes popScale{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.06); }
    100%{ transform:scale(1); }
  }

  footer{
    margin-top:14px; font-size:.72rem; color:var(--ink-soft); opacity:.7;
  }

  .shop-cta{
    margin-top:36px; padding-top:22px; border-top:1px solid rgba(80,194,192,.25);
    text-align:center;
  }
  .shop-cta img{
    width:110px; height:auto; margin-bottom:14px;
    filter:drop-shadow(0 10px 20px rgba(26,133,134,.25));
  }
  .shop-cta p{
    margin:0 0 10px; font-size:.85rem; color:var(--ink-soft);
  }
  .shop-cta a{
    display:inline-block; text-decoration:none;
    font-family:inherit; font-weight:600; font-size:.95rem; letter-spacing:.02em;
    padding:11px 28px; border-radius:999px;
    background:linear-gradient(180deg, var(--teal), var(--teal-deep));
    color:#fff;
    box-shadow:0 8px 20px rgba(26,133,134,.3);
    transition:transform .15s ease, box-shadow .25s ease;
  }
  .shop-cta a:hover{
    box-shadow:0 10px 26px rgba(26,133,134,.4); transform:translateY(-1px);
  }

  .hidden{ display:none !important; }

  /* ---- concern box ---- */
  .concern-box{
    max-width:560px; margin:0 auto 26px;
    background:rgba(255,255,255,.65);
    border:1.5px dashed rgba(80,194,192,.45);
    border-radius:14px;
    padding:16px 18px;
    text-align:left;
  }
  .concern-box label{
    display:block; font-size:.82rem; font-weight:600; color:var(--teal-deep); margin-bottom:8px;
  }
  .concern-box textarea{
    width:100%; padding:10px 12px; border-radius:10px; border:1.5px solid rgba(80,194,192,.35);
    font-family:inherit; font-size:.88rem; color:var(--ink); resize:vertical; box-sizing:border-box;
  }
  .concern-box textarea:focus{ outline:none; border-color:var(--teal-deep); }

  /* ---- lock notice ---- */
  .lock-box{
    max-width:420px; margin:48px auto 0;
    background:rgba(255,255,255,.75);
    border:1.5px solid rgba(254,197,102,.5);
    border-radius:16px;
    padding:26px 22px;
    box-shadow:0 12px 30px rgba(26,133,134,.12);
  }
  .lock-box p{ margin:0 0 10px; font-size:.88rem; color:var(--ink); line-height:1.6; }
  .lock-box .small{ font-size:.78rem; color:var(--ink-soft); }
  .lock-box input{
    width:100%; padding:10px 14px; border-radius:10px; border:1.5px solid rgba(80,194,192,.4);
    font-family:inherit; font-size:.95rem; margin:10px 0; box-sizing:border-box;
    text-align:center; letter-spacing:.05em;
  }
  .lock-box input:focus{ outline:none; border-color:var(--teal-deep); }
  #unlockMsg{ font-size:.8rem; margin-top:8px; min-height:1.2em; }
  #unlockMsg.error{ color:#c0392b; }
  #unlockMsg.success{ color:var(--teal-deep); font-weight:600; }
</style>
</head>
<body>

<div class="rays"></div>
<div id="sparkles"></div>

<div class="stage">
  <img src="assets/wol-logo.png" alt="Wizards of Learning" class="brand-logo">
  <h1>TAROT OF LEARNING</h1>
  <p class="sub">อยากให้ไพ่ช่วยอะไรคุณวันนี้?</p>

  <!-- MODE SELECT -->
  <div id="modeScreen">
    <div class="modes" id="modeList"></div>
  </div>

  <!-- SPREAD -->
  <div id="spreadScreen" class="hidden">
    <span class="backlink" id="backLink">‹ เลือกโหมดอื่น</span>
    <div class="spread-head">
      <h2 id="spreadTitle"></h2>
      <p id="spreadDesc"></p>
    </div>

    <div class="concern-box hidden" id="concernBox">
      <label for="concernInput">มีปัญหาอะไรที่กังวลอยู่ไหม? (ไม่บังคับ)</label>
      <textarea id="concernInput" rows="2" placeholder="พิมพ์สิ่งที่กังวลไว้ที่นี่ หรือจะนึกไว้ในใจก่อนเปิดไพ่ก็ได้"></textarea>
    </div>

    <div class="spread-grid" id="spreadGrid"></div>
    <div class="status" id="status"></div>

    <div class="summary" id="summary">
      <h2>สรุปคำแนะนำของคุณ</h2>
      <div id="summaryList"></div>

      <div class="share-actions">
        <button class="share-btn" id="saveImgBtn">💾 บันทึกรูป</button>
        <button class="share-btn" id="shareImgBtn">📤 แชร์</button>
        <button class="share-btn" id="copyCaptionBtn">📋 คัดลอกแคปชั่น</button>
      </div>

      <div class="nav-actions">
        <button class="nav-btn" id="restartBtn">🔁 เล่นซ้ำ <span id="restartUsesLeft" class="uses-inline"></span></button>
        <button class="nav-btn" id="otherModeBtn">🔀 เลือกโหมดใหม่</button>
      </div>
    </div>
  </div>

  <div class="shop-cta">
    <img src="assets/box-mockup.png" alt="Tarot of Learning box">
    <p>อยากได้สำรับจริงไว้ใช้เอง หรือเป็นของขวัญ?</p>
    <a href="https://shopee.co.th/wizards.of.learning/24547926267" target="_blank" rel="noopener">🛒 สั่งซื้อ Tarot of Learning</a>
  </div>

  <div class="lock-box" id="lockNotice">
    <p>🔓 มีกล่องไพ่อยู่แล้วใช่ไหม?</p>
    <p class="small">กรอกเลขบาร์โค้ดบนกล่อง แล้วเล่นได้ไม่จำกัดทุกโหมดเลย</p>
    <input id="barcodeInput" placeholder="กรอกเลขบาร์โค้ด" maxlength="20">
    <button id="unlockBtn">ปลดล็อก</button>
    <div id="unlockMsg"></div>
  </div>

  <footer>Tarot of Learning — by Wizards of Learning</footer>
</div>

<script>
const CARDS = [
  {n:0, img:"t-0.png", head:"The Fool", type:"Explorer", tagEn:"Curiosity and Beginner's Mind", tagTh:"ความอยากรู้อยากเห็นและจิตใจของผู้เริ่มต้น",
   openEn:"Let your heart lead; the journey awaits.", openTh:"หัวใจนำทาง การผจญภัยรออยู่",
   meanEn:"Represents a fresh start in learning, driven by curiosity and the willingness to explore fearlessly. Encourages learners to take risks and embrace new challenges without preconceptions.",
   meanTh:"แทนการเริ่มต้นใหม่ ความอยากรู้อยากเห็นและความกล้าที่จะทดลองสิ่งใหม่ๆ โดยปราศจากความกลัว พร้อมส่งเสริมให้กล้าที่จะเสี่ยงและเผชิญกับความท้าทายใหม่ๆ"},
  {n:1, img:"t-1.png", head:"The Magician", type:"Practice", tagEn:"Mastery and Applied Knowledge", tagTh:"ความชำนาญและการนำความรู้ไปใช้",
   openEn:"You already have it all—just start creating", openTh:"ทุกอย่างพร้อมแล้ว เหลือแค่คุณลงมือเท่านั้น",
   meanEn:"Symbolizes the power of applying knowledge in real-world contexts. Encourages learners creatively integrate skills or knowledge from different fields.",

    slots:['ด้านตัวตน จิตวิญญาณ','ด้านการงาน การเงิน','ด้านสังคม เพื่อนฝูง','ด้านความสัมพันธ์ ครอบครัว','ด้านสุขภาพ'] },
  { id:'self', label:'การเรียนรู้ตนเอง', desc:'เปิด 3 ใบ สำรวจตัวเอง', layout:'pyramid', maxUses:1,

const modeScreen = document.getElementById('modeScreen');
const spreadScreen = document.getElementById('spreadScreen');
const modeList = document.getElementById('modeList');
const spreadTitle = document.getElementById('spreadTitle');
const spreadDesc = document.getElementById('spreadDesc');
const spreadGrid = document.getElementById('spreadGrid');
const statusEl = document.getElementById('status');
const concernBox = document.getElementById('concernBox');
const concernInput = document.getElementById('concernInput');
const summary = document.getElementById('summary');
const summaryList = document.getElementById('summaryList');
const backLink = document.getElementById('backLink');
const restartBtn = document.getElementById('restartBtn');
const otherModeBtn = document.getElementById('otherModeBtn');

let currentMode = null;
let drawnCards = [];   // card object per slot, null until revealed
let usedIdx = [];
let isRevealing = false;

// ---- usage limit (per mode) + barcode unlock ----
const VALID_BARCODE = '8859787300375';

function isUnlocked(){
  return localStorage.getItem('tol_unlocked') === '1';
}
function getUses(mode){
  return parseInt(sessionStorage.getItem('tol_uses_'+mode.id) || '0', 10);
}
function usesLeft(mode){
  return isUnlocked() ? Infinity : Math.max(0, mode.maxUses - getUses(mode));
}
function canUse(mode){
  return isUnlocked() || getUses(mode) < mode.maxUses;
}
function recordUse(mode){
  if(isUnlocked()) return;
  sessionStorage.setItem('tol_uses_'+mode.id, String(getUses(mode)+1));
}

const barcodeInput = document.getElementById('barcodeInput');
const unlockBtn = document.getElementById('unlockBtn');
const unlockMsg = document.getElementById('unlockMsg');

unlockBtn.addEventListener('click', ()=>{
  const val = barcodeInput.value.trim();
  if(val === VALID_BARCODE){
    localStorage.setItem('tol_unlocked', '1');
    unlockMsg.textContent = 'ปลดล็อกสำเร็จ! ขอบคุณที่เป็นเจ้าของ Tarot of Learning 🎉';
    unlockMsg.className = 'success';
    renderModeList();
  }else{
    unlockMsg.textContent = 'เลขบาร์โค้ดไม่ถูกต้อง ลองอีกครั้งครับ';
    unlockMsg.className = 'error';
  }
});

function layoutIconHtml(layout){
  const positions = LAYOUT_POSITIONS[layout] || LAYOUT_POSITIONS.single;
  const chips = positions.map(p=>
    `<span class="layout-chip${p.alt?' alt':''}" style="left:${p.left}px;top:${p.top}px;transform:rotate(${p.rot}deg);"></span>`
  ).join('');
  return `<div class="layout-box">${chips}</div>`;
}

// ---- render mode select ----
function renderModeList(){
  modeList.innerHTML = '';
  MODES.forEach(mode=>{
    const left = usesLeft(mode);
    const locked = left <= 0;
    const el = document.createElement('div');
    el.className = 'mode-card' + (locked ? ' disabled' : '');
    const usesText = isUnlocked()
      ? 'เล่นได้ไม่จำกัดแล้ว ✨'
      : (locked ? 'ครบโควต้าแล้ว ลองกรอกบาร์โค้ดดูสิ' : `เปิดได้อีก ${left} ครั้ง`);
    el.innerHTML = `${layoutIconHtml(mode.layout)}<span class="count">${mode.slots.length} ใบ</span><h3>${mode.label}</h3><p>${mode.desc}</p><p class="uses-left">${usesText}</p>`;
    el.addEventListener('click', ()=>{
      if(!canUse(mode)){
        document.getElementById('lockNotice').scrollIntoView({behavior:'smooth', block:'center'});
        barcodeInput.focus();
        unlockMsg.textContent = 'โหมดนี้ครบโควต้าแล้ว กรอกบาร์โค้ดด้านล่างเพื่อเล่นไม่จำกัดนะ';
        unlockMsg.className = 'error';
        return;
      }
      recordUse(mode);
      startMode(mode);
    });
    modeList.appendChild(el);
  });
}

renderModeList();

function pickUniqueCard(){
  let idx;
  do{ idx = Math.floor(Math.random()*CARDS.length); }while(usedIdx.includes(idx));
  usedIdx.push(idx);
  return CARDS[idx];
}

function startMode(mode){
  currentMode = mode;
  drawnCards = new Array(mode.slots.length).fill(null);
  usedIdx = [];
  isRevealing = false;

  spreadTitle.textContent = mode.label;
  spreadDesc.textContent = mode.desc;

  spreadGrid.innerHTML = '';
  mode.slots.forEach((label, i)=>{
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.index = i;
    slot.innerHTML = `
      <div class="card-frame">
        <div class="glow"></div>
        <div class="burst"></div>
        <div class="card-3d">
          <div class="face back"><img src="assets/card-back.png" alt="back" draggable="false" oncontextmenu="return false"></div>
          <div class="face front"><img src="" alt="" draggable="false" oncontextmenu="return false"></div>
        </div>
      </div>
      <div class="slot-label">${label}</div>
      <div class="slot-quote"></div>`;
    slot.addEventListener('click', ()=>{
      if(slot.classList.contains('revealed')){
        slot.querySelector('.card-3d').classList.toggle('flipped');
      }else{
        revealSlot(i, label);
      }
    });
    spreadGrid.appendChild(slot);
  });

  if(mode.id === 'solve'){
    concernBox.classList.remove('hidden');
    concernInput.value = '';
  }else{
    concernBox.classList.add('hidden');
  }

  summary.classList.remove('show');
  summaryList.innerHTML = '';
  statusEl.textContent = 'เลือกเปิดใบไหนก่อนก็ได้';

  modeScreen.classList.add('hidden');
  spreadScreen.classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

function revealSlot(i, label){
  if(isRevealing) return;
  const slot = spreadGrid.children[i];
  if(!slot || slot.classList.contains('revealed')) return;

  isRevealing = true;
  const cardFrame = slot.querySelector('.card-frame');
  const card3d = slot.querySelector('.card-3d');
  const frontImg = slot.querySelector('.face.front img');
  const burst = slot.querySelector('.burst');

  const messages = ['กำลังสลับไพ่...', 'จักรวาลกำลังเลือกให้คุณ...', 'รอสักครู่...'];
  statusEl.textContent = messages[Math.floor(Math.random()*messages.length)];
  card3d.classList.add('shaking');
  cardFrame.classList.add('charging');

  const delay = 600 + Math.random()*300;
  setTimeout(()=>{
    card3d.classList.remove('shaking');
    cardFrame.classList.remove('charging');

    const card = pickUniqueCard();
    drawnCards[i] = card;
    frontImg.src = 'assets/cards/' + card.img;
    frontImg.alt = card.head;
    card3d.classList.add('flipped');
    slot.classList.add('revealed');

    burst.classList.add('active');
    cardFrame.classList.add('pop');
    setTimeout(()=>{ burst.classList.remove('active'); cardFrame.classList.remove('pop'); }, 700);

    const quoteEl = slot.querySelector('.slot-quote');
    quoteEl.innerHTML = `<strong>${card.head}</strong><br>"${card.openTh}"`;
    setTimeout(()=>{ quoteEl.classList.add('show'); }, 350);

    isRevealing = false;
    const revealedCount = drawnCards.filter(Boolean).length;
    if(revealedCount >= currentMode.slots.length){
      statusEl.textContent = '';
      renderSummary();
    }else{
      statusEl.textContent = `แตะไพ่ใบต่อไปได้เลย (เหลืออีก ${currentMode.slots.length - revealedCount} ใบ)`;
    }
  }, delay);
}

function renderSummary(){
  summaryList.innerHTML = '';

  const concern = concernBox.classList.contains('hidden') ? '' : concernInput.value.trim();
  if(concern){
    const concernItem = document.createElement('div');
    concernItem.className = 'summary-item';
    concernItem.innerHTML = `<div class="label">สิ่งที่คุณกังวล</div><div class="quote">"${concern}"</div>`;
    summaryList.appendChild(concernItem);
  }

  currentMode.slots.forEach((label, i)=>{
    const card = drawnCards[i];
    const item = document.createElement('div');
    item.className = 'summary-item';
    item.innerHTML = `
      <img class="summary-thumb" src="assets/cards/${card.img}" alt="${card.head}" draggable="false" oncontextmenu="return false">
      <div class="summary-text">
        <div class="label">${label}</div>
        <div class="name">${card.head}</div>
        <div class="quote">"${card.openTh}"</div>
        <div class="meaning-short">${card.meanTh}</div>
      </div>`;
    summaryList.appendChild(item);
  });

  const restartUsesLeft = document.getElementById('restartUsesLeft');
  if(isUnlocked()){
    restartUsesLeft.textContent = '(ไม่จำกัด)';
  }else{
    const left = usesLeft(currentMode);
    restartUsesLeft.textContent = left > 0 ? `(เหลือ ${left} ครั้ง)` : '(ครบโควต้าแล้ว)';
  }

  setTimeout(()=>{ summary.classList.add('show'); }, 200);
}

// ---- shareable summary image ----
function loadImg(src){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  // Thai text often has no spaces between words, so wrap character-by-character
  // (splitting only on spaces would leave un-breakable runs that overflow the box).
  const chars = text.split('');
  let line = '';
  let lines = 0;
  for(const ch of chars){
    const test = line + ch;
    if(ctx.measureText(test).width > maxWidth && line){
      ctx.fillText(line, x, y + lines*lineHeight);
      line = ch === ' ' ? '' : ch;
      lines++;
    }else{
      line = test;
    }
  }
  ctx.fillText(line, x, y + lines*lineHeight);
  return lines + 1;
}

async function buildSummaryCanvas(){
  const cardsDrawn = currentMode.slots.map((label,i)=>({label, card: drawnCards[i]})).filter(x=>x.card);
  const concern = concernBox.classList.contains('hidden') ? '' : concernInput.value.trim();

  const W = 720;
  const headerH = 130;
  const concernH = concern ? 100 : 0;
  const rowH = 150;
  const footerH = 220;
  const H = headerH + concernH + cardsDrawn.length*rowH + footerH + 30;

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const bgGrad = ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0, '#fffdf8');
  bgGrad.addColorStop(0.5, '#eaf7f6');
  bgGrad.addColorStop(1, '#d8f0ee');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  const glow = ctx.createRadialGradient(W/2,0,10, W/2,0,420);
  glow.addColorStop(0,'rgba(254,197,102,0.45)');
  glow.addColorStop(1,'rgba(254,197,102,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0,0,W,320);

  const [logo, boxImg] = await Promise.all([
    loadImg('assets/wol-logo.png'),
    loadImg('assets/box-mockup.png')
  ]);

  ctx.drawImage(logo, 30, 24, 60, 60);
  ctx.fillStyle = '#1a8586';
  ctx.font = '700 28px Kanit, sans-serif';
  ctx.fillText('สรุปคำแนะนำของคุณ', 102, 52);
  ctx.fillStyle = '#3f6e6d';
  ctx.font = '400 15px Kanit, sans-serif';
  ctx.fillText('Tarot of Learning — by Wizards of Learning', 102, 76);

  let y = headerH;

  if(concern){
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    roundRect(ctx, 30, y, W-60, concernH-16, 14); ctx.fill();
    ctx.fillStyle = '#d78600';
    ctx.font = '700 15px Kanit, sans-serif';
    ctx.fillText('สิ่งที่คุณกังวล', 50, y+30);
    ctx.fillStyle = '#1c4b4b';
    ctx.font = 'italic 16px Kanit, sans-serif';
    wrapText(ctx, '"'+concern+'"', 50, y+58, W-100, 22);
    y += concernH;
  }

  for(const {label, card} of cardsDrawn){
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    roundRect(ctx, 30, y+10, W-60, rowH-20, 14); ctx.fill();

    const thumb = await loadImg('assets/cards/'+card.img);
    ctx.drawImage(thumb, 50, y+22, 70, 119);

    ctx.fillStyle = '#d78600';
    ctx.font = '700 14px Kanit, sans-serif';
    ctx.fillText(label, 138, y+38);

    ctx.fillStyle = '#1a8586';
    ctx.font = '700 19px Kanit, sans-serif';
    ctx.fillText(card.head, 138, y+64);

    ctx.fillStyle = '#1c4b4b';
    ctx.font = 'italic 15px Kanit, sans-serif';
    wrapText(ctx, '"'+card.openTh+'"', 138, y+90, W-180, 20);

    y += rowH;
  }

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  roundRect(ctx, 30, y+10, W-60, footerH-30, 16); ctx.fill();
  ctx.drawImage(boxImg, 48, y+18, 110, 110);
  ctx.fillStyle = '#1a8586';
  ctx.font = '700 21px Kanit, sans-serif';
  ctx.fillText('Tarot of Learning', 175, y+50);
  ctx.fillStyle = '#3f6e6d';
  ctx.font = '400 14px Kanit, sans-serif';
  wrapText(ctx, 'ไพ่ทาโรต์เพื่อการเรียนรู้ โดย Wizards of Learning หาไพ่จริงไว้เปิดเองได้ที่ Shopee', 175, y+74, W-220, 19);

  // play-link CTA pill
  ctx.fillStyle = '#fec566';
  roundRect(ctx, 175, y+108, W-225, 44, 22); ctx.fill();
  ctx.fillStyle = '#1a8586';
  ctx.font = '700 16px Kanit, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🔮 มาเปิดไพ่ของตัวเองได้ที่ ' + SITE_URL.replace('https://',''), 175 + (W-225)/2, y+136);
  ctx.textAlign = 'left';

  return canvas;
}

function canvasToBlob(canvas){
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

async function withButtonBusy(btn, busyText, fn){
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = busyText;
  try{
    await fn();
  }catch(err){
    console.error(err);
  }finally{
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

const SITE_URL = 'https://wollab.github.io/WoL_Tarot_of_Learning/';
const MODE_EMOJI = { daily:'🔮', solve:'🧩', holistic:'🌿', self:'🪞' };

function buildShareCaption(){
  const emoji = MODE_EMOJI[currentMode.id] || '✨';
  const lines = [];
  lines.push(`${emoji} เพิ่งเปิดไพ่ "${currentMode.label}" จาก Tarot of Learning มา! 🃏✨`);
  lines.push('');

  const concern = concernBox.classList.contains('hidden') ? '' : concernInput.value.trim();
  if(concern){
    lines.push(`📝 เรื่องที่กังวล: "${concern}"`);
    lines.push('');
  }

  currentMode.slots.forEach((label, i)=>{
    const card = drawnCards[i];
    if(!card) return;
    lines.push(`🎴 ${label} → ${card.head}`);
    lines.push(`💬 "${card.openTh}"`);
    lines.push('');
  });

  lines.push('อยากรู้ว่าไพ่จะบอกอะไรกับตัวเองบ้าง ลองเปิดดูเลย 👇');
  lines.push(`🔗 ${SITE_URL}`);
  lines.push('');
  lines.push('🪄 Tarot of Learning — by Wizards of Learning');
  lines.push('');
  const modeTag = '#' + currentMode.label.replace(/\s+/g, '');
  lines.push(`#WizardsofLearning #TarotofLearning ${modeTag}`);
  return lines.join('\n');
}

const saveImgBtn = document.getElementById('saveImgBtn');
const shareImgBtn = document.getElementById('shareImgBtn');
const copyCaptionBtn = document.getElementById('copyCaptionBtn');

copyCaptionBtn.addEventListener('click', async ()=>{
  const original = copyCaptionBtn.textContent;
  try{
    await navigator.clipboard.writeText(buildShareCaption());
    copyCaptionBtn.textContent = '✅ คัดลอกแล้ว!';
  }catch(e){
    copyCaptionBtn.textContent = '⚠️ คัดลอกไม่สำเร็จ';
  }
  setTimeout(()=>{ copyCaptionBtn.textContent = original; }, 2500);
});

saveImgBtn.addEventListener('click', ()=>{
  withButtonBusy(saveImgBtn, 'กำลังสร้างภาพ...', async ()=>{
    const canvas = await buildSummaryCanvas();
    const blob = await canvasToBlob(canvas);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tarot-of-learning-summary.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });
});

// Only show the share button on platforms that actually support sharing files
// (most desktop browsers report navigator.share but silently fail on files).
const canShareFiles = !!(navigator.canShare && navigator.share && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent));
if(!canShareFiles){
  shareImgBtn.classList.add('hidden');
}

shareImgBtn.addEventListener('click', ()=>{
  withButtonBusy(shareImgBtn, 'กำลังสร้างภาพ...', async ()=>{
    const canvas = await buildSummaryCanvas();
    const blob = await canvasToBlob(canvas);
    const file = new File([blob], 'tarot-of-learning-summary.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({
          files:[file],
          title:'Tarot of Learning',
          text:buildShareCaption()
        });
      }catch(e){ /* user cancelled share — not an error */ }
    }else{
      alert('เครื่องนี้แชร์ไฟล์ไม่ได้ ลองกดปุ่ม "บันทึกภาพสรุป" แทนนะครับ');
    }
  });
});

backLink.addEventListener('click', ()=>{
  spreadScreen.classList.add('hidden');
  modeScreen.classList.remove('hidden');
  renderModeList();
});
otherModeBtn.addEventListener('click', ()=>{
  spreadScreen.classList.add('hidden');
  modeScreen.classList.remove('hidden');
  renderModeList();
});
restartBtn.addEventListener('click', ()=>{
  if(!canUse(currentMode)){
    spreadScreen.classList.add('hidden');
    modeScreen.classList.remove('hidden');
    renderModeList();
    return;
  }
  recordUse(currentMode);
  startMode(currentMode);
});
</script>
